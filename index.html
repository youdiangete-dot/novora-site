<!DOCTYPE html>
<html>
<head>
  <title>NOVORA</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: serif;
    }

    .envelope {
      position: relative;
      width: 320px;
      height: 200px;
      background: #1e4a3a;
      border-radius: 4px;
      cursor: pointer;
    }

    /* 上盖 */
    .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #1e4a3a;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      transition: 0.6s;
      z-index: 2;
    }

    /* 信纸 */
    .letter {
      position: absolute;
      width: 90%;
      height: 80%;
      background: #f5f1e6;
      top: 10%;
      left: 5%;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      font-size: 18px;
      transition: 0.6s;
    }

    /* 金色火漆 */
    .seal {
      position: absolute;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, gold, #c9a200);
      border-radius: 50%;
      top: 60px;
      left: 130px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      color: black;
      z-index: 3;
      transition: 0.3s;
    }

    .seal:hover {
      transform: scale(1.1);
    }

    /* 打开状态 */
    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      transform: translateY(-120px);
    }

    .open .seal {
      opacity: 0;
    }
  </style>
</head>

<body>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>
  <div class="letter">NOVORA</div>
  <div class="seal">OPEN</div>
</div>

<script>
function openEnvelope(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
