<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVORA</title>

  <style>
    :root {
      --gold: #c7a45a;
      --gold-soft: rgba(199, 164, 90, 0.45);
      --paper: #eadfca;
      --ink: #2b2418;
      --green: #0d261d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #020202;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.7)),
        url("./public/assets/marble_bg.jpg") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand {
      position: absolute;
      top: 26px;
      right: 34px;
      text-align: right;
      letter-spacing: 0.26em;
      font-size: 22px;
      font-weight: 600;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      font-size: 7px;
      letter-spacing: 0.32em;
      opacity: 0.8;
    }

    .intro {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(760px, 90vw);
      text-align: center;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .intro.hidden {
      opacity: 0;
      transform: translate(-50%, -58%);
      pointer-events: none;
    }

    .envelope-wrap {
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 28px 40px rgba(0,0,0,0.65));
    }

    .envelope-img {
  .envelope-img {
  width: min(820px, 88vw);
  display: block;
  filter:
    saturate(1.45)
    hue-rotate(10deg)
    brightness(0.78)
    contrast(1.12)
    sepia(0.08);
  transition: transform 0.7s ease, opacity 0.7s ease;
}
    

    .intro.opened .envelope-img {
      transform: translateY(-18px) scale(1.02);
      opacity: 0;
    }

    .seal-hit {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .seal-hit::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 999px;
      box-shadow: 0 0 0 rgba(199,164,90,0);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .seal-hit:hover::after {
      transform: scale(1.08);
      box-shadow: 0 0 42px rgba(199,164,90,0.55);
    }

    .headline {
      margin-top: -18px;
      font-size: clamp(17px, 2.4vw, 24px);
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(199,164,90,0.35);
    }

    .subhead {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(234,223,202,0.8);
      letter-spacing: 0.08em;
    }

    .open-btn {
      margin-top: 22px;
      padding: 11px 34px;
      border: 1px solid rgba(199,164,90,0.8);
      border-radius: 4px;
      background: rgba(5,5,5,0.55);
      color: var(--gold);
      letter-spacing: 0.16em;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      box-shadow: inset 0 0 18px rgba(199,164,90,0.08), 0 0 18px rgba(0,0,0,0.8);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .open-btn:hover {
      transform: translateY(-1px);
      background: rgba(18,15,10,0.78);
      box-shadow: inset 0 0 22px rgba(199,164,90,0.18), 0 0 24px rgba(199,164,90,0.25);
    }

    .story {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .story.active {
      display: flex;
      animation: fadeIn 0.85s ease both;
    }

    .paper-stage {
      position: relative;
      width: min(850px, 88vw);
      min-height: 370px;
      padding: 58px 58px 46px;
      color: var(--ink);
      text-align: center;
      background:
        linear-gradient(rgba(245,236,214,0.65), rgba(219,201,165,0.55)),
        url("./public/assets/paper_blank_texture.png") center / cover no-repeat;
      filter: drop-shadow(0 28px 42px rgba(0,0,0,0.7));
      border-radius: 3px;
      animation: paperRise 1s ease both;
    }

    .paper-stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(94,73,42,0.25);
      pointer-events: none;
    }

    .paper-title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.2vw, 34px);
      font-weight: 600;
    }

    .paper-subtitle {
      margin: 0 0 36px;
      font-size: 13px;
      opacity: 0.72;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 20px;
    }

    .choice {
      min-height: 120px;
      border: 1px solid rgba(75,55,28,0.22);
      background: rgba(255,248,231,0.2);
      border-radius: 8px;
      padding: 24px 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #3b2d1c;
      font-family: Georgia, "Times New Roman", serif;
    }

    .choice .icon {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 14px;
      color: rgba(67,49,26,0.78);
    }

    .choice strong {
      display: block;
      font-size: 15px;
    }

    .choice:hover,
    .choice.selected {
      transform: translateY(-4px);
      background: rgba(30, 24, 17, 0.88);
      color: var(--gold);
      border-color: rgba(199,164,90,0.85);
      box-shadow: 0 0 34px rgba(199,164,90,0.28);
    }

    .choice:hover .icon,
    .choice.selected .icon {
      color: var(--gold);
    }

    .nav {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: rgba(43,36,24,0.78);
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 31px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(73,55,28,0.26);
    }

    .dots span.active {
      background: var(--gold);
      box-shadow: 0 0 12px rgba(199,164,90,0.8);
    }

    .quill {
      position: absolute;
      right: -42px;
      bottom: -32px;
      width: 210px;
      opacity: 0.9;
      transform: rotate(-4deg);
      pointer-events: none;
    }

    .silk {
      position: absolute;
      left: -120px;
      bottom: -100px;
      width: 330px;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes paperRise {
      from {
        opacity: 0;
        transform: translateY(45px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 720px) {
      .paper-stage {
        padding: 42px 22px 56px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .quill {
        width: 130px;
        right: -20px;
      }

      .silk {
        width: 220px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="brand">
      NOVORA
      <small>BESPOKE JEWELRY</small>
    </div>

    <section class="intro" id="intro">
      <div class="envelope-wrap">
        <img class="envelope-img" src="./public/assets/envelope_closed.png" alt="NOVORA closed envelope">
        <button class="seal-hit" onclick="openLetter()" aria-label="Open the letter"></button>
      </div>

      <div class="headline">A Letter Begins With A Feeling</div>
      <div class="subhead">Your Custom Jewelry Starts Here</div>
      <button class="open-btn" onclick="openLetter()">OPEN THE LETTER →</button>
    </section>

    <section class="story" id="story">
      <div class="paper-stage">
      <!-- <img class="silk" src="./public/assets/green_silk_fabric.png" alt=""> -->
        <!-- <img class="quill" src="./public/assets/quill_pen.png" alt=""> -->
        <h1 class="paper-title">Who is this jewelry for?</h1>
        <p class="paper-subtitle">This helps us understand the meaning behind your gift.</p>

        <div class="choices">
          <button class="choice" onclick="selectChoice(this)">
            <div class="icon">♡</div>
            <strong>Myself</strong>
          </button>

          <button class="choice selected" onclick="selectChoice(this)">
            <div class="icon">♥</div>
            <strong>Partner</strong>
          </button>

          <button class="choice" onclick="selectChoice(this)">
            <div class="icon">♚</div>
            <strong>Family or Friend</strong>
          </button>
        </div>

        <div class="dots">
          <span class="active"></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="nav">
          <button onclick="backToEnvelope()">← Back</button>
          <button>Next →</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    function openLetter() {
      const intro = document.getElementById("intro");
      const story = document.getElementById("story");

      intro.classList.add("opened");

      setTimeout(() => {
        intro.classList.add("hidden");
        story.classList.add("active");
      }, 650);
    }

    function backToEnvelope() {
      const intro = document.getElementById("intro");
      const story = document.getElementById("story");

      story.classList.remove("active");
      intro.classList.remove("hidden");
      intro.classList.remove("opened");
    }

    function selectChoice(button) {
      document.querySelectorAll(".choice").forEach(item => {
        item.classList.remove("selected");
      });
      button.classList.add("selected");
    }
  </script>
</body>
</html>
