<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVORA</title>

  <style>
    :root {
      --gold: #c7a45a;
      --gold-soft: rgba(199, 164, 90, 0.45);
      --paper: #eadfca;
      --ink: #2b2418;
      --green: #0d261d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #020202;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.7)),
        url("./public/assets/marble_bg.jpg") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand {
      position: absolute;
      top: 26px;
      right: 34px;
      text-align: right;
      letter-spacing: 0.26em;
      font-size: 22px;
      font-weight: 600;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      font-size: 7px;
      letter-spacing: 0.32em;
      opacity: 0.8;
    }

    .intro {
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100vw;
  text-align: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
  z-index: 5;
}

    .intro.hidden {
      opacity: 0;
      transform: translate(-50%, -58%);
      pointer-events: none;
    }

   .envelope-wrap {
  position: relative;
  display: inline-block;
  transform: translateY(125px);
  filter: drop-shadow(0 28px 40px rgba(0,0,0,0.65));
}
   
  .envelope-img {
 width: min(980px, 72vw);
  display: block;
  filter:
    saturate(1.45)
    hue-rotate(10deg)
    brightness(0.78)
    contrast(1.12)
    sepia(0.08);
  transition: transform 0.7s ease, opacity 0.7s ease;
}
    

    .intro.opened .envelope-img {
      transform: translateY(-18px) scale(1.02);
      opacity: 0;
    }

    .seal-hit {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .seal-hit::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 999px;
      box-shadow: 0 0 0 rgba(199,164,90,0);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .seal-hit:hover::after {
      transform: scale(1.08);
      box-shadow: 0 0 42px rgba(199,164,90,0.55);
    }

    .headline {
  margin-top: 22px;
      font-size: clamp(17px, 2.4vw, 24px);
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(199,164,90,0.35);
    }

    .subhead {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(234,223,202,0.8);
      letter-spacing: 0.08em;
    }

    .open-btn {
      margin-top: 22px;
      padding: 11px 34px;
      border: 1px solid rgba(199,164,90,0.8);
      border-radius: 4px;
      background: rgba(5,5,5,0.55);
      color: var(--gold);
      letter-spacing: 0.16em;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      box-shadow: inset 0 0 18px rgba(199,164,90,0.08), 0 0 18px rgba(0,0,0,0.8);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .open-btn:hover {
      transform: translateY(-1px);
      background: rgba(18,15,10,0.78);
      box-shadow: inset 0 0 22px rgba(199,164,90,0.18), 0 0 24px rgba(199,164,90,0.25);
    }

    .story {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

    .story.active {
      display: flex;
      animation: fadeIn 0.85s ease both;
    }

   .paper-stage {
  position: relative;
  width: min(720px, 78vw);
  min-height: 300px;
  padding: 44px 52px 38px;
  color: var(--ink);
  text-align: center;
  background: url("./public/assets/paper_blank_texture.png") center / 100% 100% no-repeat;
  filter: drop-shadow(0 24px 38px rgba(0,0,0,0.75));
  border-radius: 2px;
  animation: paperRise 1s ease both;
}

    /*
.paper-stage::before {
  content: "";
  position: absolute;
  inset: 14px;
  border: 1px solid rgba(94,73,42,0.25);
  pointer-events: none;
}
*/

    .paper-title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.2vw, 34px);
      font-weight: 600;
    }

    .paper-subtitle {
      margin: 0 0 36px;
      font-size: 13px;
      opacity: 0.72;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 20px;
    }

    .choice {
      min-height: 120px;
      border: 1px solid rgba(75,55,28,0.22);
      background: rgba(255,248,231,0.2);
      border-radius: 8px;
      padding: 24px 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #3b2d1c;
      font-family: Georgia, "Times New Roman", serif;
    }

    .choice .icon {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 14px;
      color: rgba(67,49,26,0.78);
    }

    .choice strong {
      display: block;
      font-size: 15px;
    }

    .choice:hover,
    .choice.selected {
      transform: translateY(-4px);
      background: rgba(30, 24, 17, 0.88);
      color: var(--gold);
      border-color: rgba(199,164,90,0.85);
      box-shadow: 0 0 34px rgba(199,164,90,0.28);
    }

    .choice:hover .icon,
    .choice.selected .icon {
      color: var(--gold);
    }

    .nav {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: rgba(43,36,24,0.78);
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 31px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(73,55,28,0.26);
    }

    .dots span.active {
      background: var(--gold);
      box-shadow: 0 0 12px rgba(199,164,90,0.8);
    }

    .quill {
      position: absolute;
      right: -42px;
      bottom: -32px;
      width: 210px;
      opacity: 0.9;
      transform: rotate(-4deg);
      pointer-events: none;
    }

    .silk {
      position: absolute;
      left: -120px;
      bottom: -100px;
      width: 330px;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes paperRise {
      from {
        opacity: 0;
        transform: translateY(45px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 720px) {
      .paper-stage {
        padding: 42px 22px 56px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .quill {
        width: 130px;
        right: -20px;
      }

      .silk {
        width: 220px;
      }
    }
.letter-stage {
  position: relative;
  width: min(1040px, 88vw);
  height: min(620px, 82vh);
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
}

.letter-paper {
  position: relative;
  width: 100%;
  height: 100%;
  color: var(--ink);
  text-align: left;
  background: url("./public/assets/paper_letter_wide.png") center / 100% 100% no-repeat;
  border: 0;
  box-shadow: none;
  border-radius: 0;
  overflow: hidden;
}
.typed-letter {
  position: absolute;
  top: 92px;
  left: 250px;
  width: 560px;
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 16px;
  line-height: 1.5;
  letter-spacing: 0.01em;
  color: rgba(43, 36, 24, 0.82);
  white-space: pre-line;
  min-height: 250px;
}
.recipient-step {
  display: none;
  text-align: center;
  animation: fadeIn 0.8s ease both;
}

.recipient-step.active {
  display: block;
}

.recipient-title {
  margin: 0 0 22px;
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 600;
  color: rgba(43, 36, 24, 0.92);
}

.input-wrap {
  position: absolute;
  left: 230px;
  top: 385px;
  width: 610px;
  display: grid;
  grid-template-columns: 1fr 210px;
  gap: 16px;
  align-items: stretch;
  margin: 0;
}

.person-input {
  min-height: 92px;
  resize: none;
  padding: 18px 20px;
  border: 1px solid rgba(91, 70, 38, 0.24);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.28);
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 15px;
  outline: none;
}

.person-input::placeholder {
  color: rgba(43, 36, 24, 0.45);
}

.voice-btn {
  padding: 0 22px;
  border: 1px solid rgba(91, 70, 38, 0.24);
  border-radius: 8px;
  background: rgba(28, 22, 15, 0.78);
  color: var(--gold);
  font-family: Georgia, "Times New Roman", serif;
  cursor: pointer;
}
.quick-options {
  position: absolute;
  left: 245px;
top: 484px;
  width: 570px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  opacity: 0.86;
}
.quick-options button {
  width: 92px;
  height: 76px;
  padding: 8px 6px;
  border: 1px solid rgba(91, 70, 38, 0.28);
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.18);
  color: rgba(43, 36, 24, 0.78);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 13px;
  cursor: pointer;
  box-shadow:
    0 8px 18px rgba(45, 30, 12, 0.14),
    inset 0 1px 0 rgba(255,255,255,0.35);
}
.quick-options button img {
  width: 40px;
  height: 40px;
  display: block;
  margin: 0 auto 4px;
  object-fit: contain;
  opacity: 1;
  transform: scale(1.75);
  transform-origin: center;
}

.quick-options button span {
  display: block;
}

.quick-options button:hover {
  border-color: rgba(199,164,90,0.75);
  color: var(--gold);
  background: rgba(28, 22, 15, 0.76);
}
  .nav {
  position: absolute;
  left: 72px;
  right: 72px;
  bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 8;
}

.nav button {
  min-width: 96px;
  height: 42px;
  border: 0;
  border-radius: 8px;
  background: rgba(255, 248, 232, 0.62);
  color: rgba(58, 43, 24, 0.96);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 17px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(45, 30, 12, 0.12);
}
    </style>
</head>

<body>
  <main class="page">
    <div class="brand">
      NOVORA
      <small>BESPOKE JEWELRY</small>
    </div>

    <section class="intro" id="intro">
      <div class="envelope-wrap">
        <img class="envelope-img" src="./public/assets/envelope_closed.png" alt="NOVORA closed envelope">
        <button class="seal-hit" onclick="openLetter()" aria-label="Open the letter"></button>
      </div>

      <div class="headline">A Letter Begins With A Feeling</div>
      <div class="subhead">Your Custom Jewelry Starts Here</div>
      <button class="open-btn" onclick="openLetter()">OPEN THE LETTER →</button>
    </section>

    <section class="story" id="story">
  <div class="letter-stage">
    <div class="letter-paper">
      <div class="typed-letter" id="typedLetter"></div>

      <div class="recipient-step" id="recipientStep">
        <h1 class="recipient-title"></h1>

        <div class="input-wrap">
          <textarea
            class="person-input"
            placeholder="Tell us about the person..."
          ></textarea>

          <button class="voice-btn" type="button">
            🎤 Speak your thoughts
          </button>
        </div>

      
      
          <div class="quick-options">
  <button type="button">
    <img src="./public/assets/icon_partner_heart.png" alt="">
    <span>My Partner</span>
  </button>
  <button type="button">
    <img src="./public/assets/icon_family_friend.png" alt="">
    <span>My Family</span>
  </button>
  <button type="button">
    <img src="./public/assets/icon_family_friend.png" alt="">
    <span>My Friend</span>
  </button>
  <button type="button">
    <img src="./public/assets/icon_memory.png" alt="">
    <span>My Memory</span>
  </button>
  <button type="button">
    <img src="./public/assets/icon_myself.png" alt="">
    <span>Myself</span>
  </button>
</div>
          <div class="nav">
          <button onclick="backToEnvelope()">← Back</button>
          <button>Next →</button>
      </div>
    </div>
  </div>
</section>
  </main>

  <script>
const letterText = `This is a one-of-a-kind expression of love —
designed by you, and brought to life by us.

From different corners of the world,
we source the finest materials,
craft them by hand,
and connect every step through the latest AI technology.

All to create something truly unique —
a piece that exists only for this love.`;

const questionText = `

Who is this piece of love meant for?`;

let typingTimer;

function typeText(text, element, speed, done) {
  let i = 0;
  element.textContent = "";
  clearInterval(typingTimer);

  typingTimer = setInterval(() => {
    element.textContent += text.charAt(i);
    i++;

    if (i >= text.length) {
      clearInterval(typingTimer);
      if (done) done();
    }
  }, speed);
}

function openLetter() {
  const intro = document.getElementById("intro");
  const story = document.getElementById("story");
  const typedLetter = document.getElementById("typedLetter");
  const recipientStep = document.getElementById("recipientStep");

  intro.classList.add("opened");

  setTimeout(() => {
    intro.classList.add("hidden");
    intro.style.display = "none";
    story.classList.add("active");

    recipientStep.classList.remove("active");

    typeText(letterText, typedLetter, 38, () => {
      setTimeout(() => {
        typeText(letterText + questionText, typedLetter, 34, () => {
          setTimeout(() => {
            recipientStep.classList.add("active");
          }, 500);
        });
      }, 1000);
    });
  }, 650);
}

function backToEnvelope() {
  const intro = document.getElementById("intro");
  const story = document.getElementById("story");
  const typedLetter = document.getElementById("typedLetter");
  const recipientStep = document.getElementById("recipientStep");

  clearInterval(typingTimer);
  typedLetter.textContent = "";
  recipientStep.classList.remove("active");

  story.classList.remove("active");
  intro.style.display = "block";
  intro.classList.remove("hidden");
  intro.classList.remove("opened");
}
</script>
</body>
</html>
