<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVORA Letter Experience</title>
    <style>
      :root {
        --gold-100: #f9eccf;
        --gold-300: #e7c78d;
        --gold-500: #bf8f4e;
        --paper-text: #2d1c0d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        color: var(--gold-100);
        min-height: 100vh;
        background: #080808;
      }

      .page-shell {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: clamp(16px, 3vw, 36px);
      }

      .bg-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(155deg, rgba(0, 0, 0, 0.55), rgba(8, 8, 8, 0.93)),
          url('/assets/marble_bg.jpg') center / cover no-repeat;
        filter: saturate(0.92) contrast(1.1);
      }

      .hero-stage,
      .paper-stage {
        position: relative;
        z-index: 2;
        width: min(940px, 100%);
      }

      .hero-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 2.4vh, 26px);
        text-align: center;
        transition: transform 820ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 760ms ease;
        transform-origin: center top;
      }

      .hero-stage.is-shifted {
        transform: translateY(-26px) scale(0.975);
        opacity: 0.08;
        pointer-events: none;
      }

      .envelope-shell {
        position: relative;
        width: min(430px, 84vw);
        transition: transform 700ms ease;
      }

      .envelope-shell.is-open {
        transform: translateY(-18px) rotateX(7deg);
      }

      .envelope-image {
        width: 100%;
        display: block;
        filter: drop-shadow(0 14px 35px rgba(0, 0, 0, 0.55));
      }

      .wax-seal {
        position: absolute;
        left: 50%;
        bottom: 19%;
        transform: translateX(-50%);
        width: 72px;
        height: 72px;
        border-radius: 999px;
        border: 1px solid rgba(255, 223, 137, 0.55);
        background: radial-gradient(circle at 32% 26%, #ffe9b2 0%, #cb9953 38%, #7e4a1f 100%);
        box-shadow: 0 0 0 2px rgba(32, 19, 8, 0.45), 0 10px 22px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }

      .wax-seal.is-activated { animation: sealPress 650ms ease forwards; }

      h1 {
        margin: 0;
        color: #fff4d4;
        text-shadow: 0 6px 26px rgba(0, 0, 0, 0.72);
        font-size: clamp(1.02rem, 2.15vw, 1.48rem);
        letter-spacing: 0.16em;
        line-height: 1.5;
      }

      .open-cta {
        border: 1px solid rgba(186, 151, 94, 0.66);
        background:
          linear-gradient(178deg, rgba(58, 42, 21, 0.88), rgba(30, 22, 12, 0.9)),
          radial-gradient(140% 80% at 20% 10%, rgba(230, 196, 137, 0.12), rgba(0, 0, 0, 0) 56%);
        color: #f2ddb2;
        letter-spacing: 0.14em;
        font-size: 0.86rem;
        padding: 12px 30px;
        border-radius: 999px;
        cursor: pointer;
        box-shadow:
          0 9px 20px rgba(0, 0, 0, 0.34),
          0 2px 0 rgba(246, 231, 198, 0.12) inset,
          0 -5px 10px rgba(0, 0, 0, 0.18) inset;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .open-cta:hover {
        transform: translateY(-1px);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.38),
          0 2px 0 rgba(246, 231, 198, 0.16) inset,
          0 -5px 10px rgba(0, 0, 0, 0.2) inset;
        filter: saturate(0.98);
      }

      .paper-stage {
        margin-top: clamp(14px, 3.4vh, 34px);
        opacity: 0;
        transform: translateY(52px) scale(0.975);
        transition: opacity 880ms ease, transform 880ms cubic-bezier(0.2, 0.8, 0.2, 1);
        pointer-events: none;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .paper-stage.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .paper-frame {
        width: min(860px, 96vw);
        padding: clamp(14px, 2.2vw, 24px);
        border-radius: 26px;
        background:
          linear-gradient(188deg, rgba(206, 179, 132, 0.11), rgba(109, 84, 52, 0.055)),
          radial-gradient(150% 86% at 14% 10%, rgba(224, 199, 162, 0.085), rgba(0, 0, 0, 0) 55%),
          radial-gradient(118% 104% at 88% 90%, rgba(93, 69, 40, 0.045), rgba(0, 0, 0, 0) 61%);
        border: 1px solid rgba(182, 150, 102, 0.34);
        box-shadow:
          0 52px 126px rgba(0, 0, 0, 0.72),
          0 24px 42px rgba(30, 21, 12, 0.38),
          0 -6px 11px rgba(236, 225, 203, 0.08),
          0 0 0 1px rgba(218, 197, 154, 0.14) inset;
        backdrop-filter: blur(2.2px);
      }

      .paper-surface {
        margin: 0 auto;
        width: min(760px, 100%);
        min-height: 510px;
        background:
          radial-gradient(132% 84% at 9% 5%, rgba(248, 240, 224, 0.265), rgba(0, 0, 0, 0) 53%),
          radial-gradient(80% 56% at 27% 63%, rgba(233, 215, 184, 0.082), rgba(0, 0, 0, 0) 67%),
          radial-gradient(106% 114% at 91% 81%, rgba(171, 144, 102, 0.078), rgba(0, 0, 0, 0) 56%),
          radial-gradient(64% 50% at 77% 24%, rgba(244, 233, 209, 0.052), rgba(0, 0, 0, 0) 65%),
          radial-gradient(52% 36% at 17% 81%, rgba(122, 89, 49, 0.035), rgba(0, 0, 0, 0) 71%),
          linear-gradient(176deg, #f0e2ca 0%, #e9d7bc 57%, #dbc4a1 100%);
        border-radius: 20px;
        border: 1px solid rgba(163, 131, 85, 0.5);
        box-shadow:
          0 1px 0 rgba(242, 233, 214, 0.31) inset,
          0 -12px 24px rgba(126, 92, 50, 0.13) inset,
          0 20px 36px rgba(84, 61, 33, 0.17) inset,
          0 -2px 6px rgba(92, 66, 37, 0.07) inset,
          0 50px 88px rgba(0, 0, 0, 0.53),
          0 18px 32px rgba(51, 37, 20, 0.28),
          0 -6px 15px rgba(232, 221, 198, 0.1);
        padding: clamp(24px, 4vw, 40px) clamp(20px, 4.3vw, 42px) clamp(28px, 4.6vw, 44px);
        color: var(--paper-text);
        transform-origin: top center;
        animation: paperUnfold 900ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        position: relative;
        transform: translateY(-5px);
      }

      .paper-surface::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background:
          radial-gradient(150% 94% at 31% -20%, rgba(251, 243, 227, 0.21), rgba(0, 0, 0, 0) 53%),
          radial-gradient(148% 102% at 61% 123%, rgba(92, 67, 38, 0.1), rgba(0, 0, 0, 0) 60%),
          radial-gradient(108% 72% at 8% 79%, rgba(96, 71, 42, 0.051), rgba(0, 0, 0, 0) 61%),
          radial-gradient(68% 44% at 94% 63%, rgba(104, 77, 46, 0.028), rgba(0, 0, 0, 0) 69%);
        mix-blend-mode: multiply;
      }

      .paper-surface::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 58% 43%, rgba(0, 0, 0, 0) 54%, rgba(84, 59, 32, 0.142) 100%),
          radial-gradient(99% 80% at 69% 12%, rgba(0, 0, 0, 0), rgba(106, 76, 40, 0.066) 97%),
          radial-gradient(72% 64% at 6% 94%, rgba(113, 84, 48, 0.041), rgba(0, 0, 0, 0) 66%),
          radial-gradient(60% 42% at 93% 7%, rgba(120, 92, 56, 0.024), rgba(0, 0, 0, 0) 71%);
      }

      .paper-header {
        display: flex;
        align-items: center;
        gap: 2px;
        min-height: 38px;
        border-bottom: 1px solid rgba(88, 57, 24, 0.33);
        padding-bottom: 12px;
        margin-bottom: 22px;
      }

      .typing-line { margin: 0; font-size: clamp(1rem, 1.75vw, 1.2rem); color: #241202; font-weight: 600; letter-spacing: 0.01em; }
      .typing-cursor { font-size: 1.1rem; animation: blink 760ms step-end infinite; }
      .typing-cursor.is-done { opacity: 0.35; animation: none; }

      .flow-body {
        display: flex;
        flex-direction: column;
        gap: clamp(18px, 2.3vh, 24px);
        padding-top: 4px;
      }
      .step-pills { display: flex; flex-wrap: wrap; gap: 11px; }

      .step-panel {
        background: rgba(255, 250, 238, 0.52);
        border: 1px solid rgba(182, 136, 63, 0.32);
        border-radius: 14px;
        padding: clamp(14px, 2vw, 20px);
        box-shadow: 0 8px 20px rgba(122, 88, 43, 0.12) inset;
      }

      .step-pill {
        text-transform: capitalize;
        padding: 6px 12px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, #e8d8b5 0%, #dbc49a 100%),
          radial-gradient(120% 80% at 18% 15%, rgba(255, 247, 229, 0.18), rgba(0, 0, 0, 0) 58%);
        color: #4b3318;
        font-size: 0.82rem;
        border: 1px solid rgba(171, 137, 86, 0.65);
        box-shadow:
          0 1px 0 rgba(255, 247, 229, 0.35) inset,
          0 -2px 4px rgba(125, 92, 50, 0.15) inset;
      }

      .step-pill.is-active {
        background:
          linear-gradient(166deg, #3a5d3d, #28432b 65%, #223826 100%),
          radial-gradient(120% 90% at 22% 10%, rgba(255, 241, 204, 0.16), rgba(0, 0, 0, 0) 58%);
        color: #f6e7c3;
        border-color: rgba(188, 155, 102, 0.74);
        box-shadow:
          0 7px 14px rgba(22, 35, 24, 0.26),
          0 1px 0 rgba(232, 211, 170, 0.22) inset;
      }

      .step-pill.is-complete { background: #dac4a0; color: #422b13; }

      .step-panel h2 { margin: 0 0 12px; color: #1f1106; font-size: 1.26rem; letter-spacing: 0.02em; }
      .step-panel p, .step-panel label { margin: 0 0 13px; color: #3e270f; line-height: 1.58; font-size: 1.03rem; }

      .step-panel input {
        width: min(440px, 100%);
        border: 1px solid #b0864a;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.95);
        color: #2a1708;
        box-shadow: inset 0 1px 2px rgba(99, 67, 30, 0.16), 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .option-row { display: flex; flex-wrap: wrap; gap: 12px; }

      .option-btn,
      .step-actions button {
        border: 1px solid rgba(168, 131, 79, 0.72);
        background:
          linear-gradient(180deg, #f4e7cd 0%, #e8d4ad 100%),
          radial-gradient(130% 80% at 20% 14%, rgba(255, 247, 228, 0.2), rgba(0, 0, 0, 0) 60%);
        color: #38210b;
        border-radius: 999px;
        padding: 10px 19px;
        cursor: pointer;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
        box-shadow:
          0 1px 0 rgba(255, 246, 223, 0.48) inset,
          0 -3px 7px rgba(124, 92, 50, 0.16) inset,
          0 3px 8px rgba(71, 44, 14, 0.12);
      }

      .option-btn:hover,
      .step-actions button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow:
          0 1px 0 rgba(255, 246, 223, 0.56) inset,
          0 -3px 7px rgba(124, 92, 50, 0.18) inset,
          0 7px 14px rgba(71, 44, 14, 0.16);
        filter: saturate(0.99);
      }

      .option-btn.is-selected {
        background:
          linear-gradient(166deg, #345a39, #223b26 66%, #1d3120 100%),
          radial-gradient(120% 90% at 24% 12%, rgba(244, 229, 192, 0.18), rgba(0, 0, 0, 0) 56%);
        color: #f7e8c8;
        border-color: rgba(170, 137, 86, 0.8);
        box-shadow:
          0 8px 16px rgba(29, 49, 33, 0.28),
          0 1px 0 rgba(235, 214, 173, 0.18) inset;
      }

      .emotion-card {
        background:
          linear-gradient(rgba(255, 248, 232, 0.45), rgba(255, 248, 232, 0.28)),
          url("/assets/choice_card_unselected.png") center / cover no-repeat;
      }

      .design-chip {
        background:
          linear-gradient(rgba(255, 248, 232, 0.34), rgba(255, 248, 232, 0.2)),
          url("/assets/choice_card_unselected.png") center / cover no-repeat;
      }

      .step-actions { margin-top: 14px; display: flex; justify-content: space-between; gap: 12px; }
      .step-actions button:disabled { opacity: 0.45; cursor: not-allowed; }

      @media (max-width: 900px) {
        .hero-stage { gap: 18px; }
        .paper-stage { margin-top: 18px; }
        .paper-frame { width: min(860px, 98vw); padding: 12px; }
        .paper-surface {
          min-height: 470px;
          padding: 22px 18px 28px;
          border-radius: 18px;
        }
      }

      @media (max-width: 640px) {
        .hero-stage { width: 100%; }
        .paper-stage { margin-top: 14px; transform: translateY(44px) scale(0.982); }
        .paper-frame { padding: 10px; border-radius: 20px; }
        .paper-surface {
          width: 100%;
          min-height: 430px;
          padding: 20px 14px 24px;
          border-radius: 16px;
        }
        .flow-body { gap: 16px; }
      }

      @keyframes sealPress {
        0% { transform: translateX(-50%) scale(1); }
        35% { transform: translateX(-50%) scale(0.9); }
        100% { transform: translateX(-50%) translateY(22px) scale(0.25); opacity: 0; }
      }
      @keyframes paperUnfold {
        0% { opacity: 0; transform: rotateX(-52deg) translateY(-40px) scaleY(0.2); }
        100% { opacity: 1; transform: rotateX(0deg) translateY(0) scaleY(1); }
      }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="bg-overlay"></div>

      <section id="heroStage" class="hero-stage">
        <div id="envelopeShell" class="envelope-shell">
          <img src="/assets/envelope_closed.png" alt="Dark green envelope" class="envelope-image" />
          <button id="waxSeal" type="button" aria-label="Open letter seal" class="wax-seal"></button>
        </div>
        <h1>EVERY FOREVER PIECE BEGINS WITH A LOVE STORY</h1>
        <button id="openCta" type="button" class="open-cta">BEGIN YOUR LETTER</button>
      </section>

      <section id="paperStage" class="paper-stage">
        <div class="paper-frame">
          <article class="paper-surface">
            <header class="paper-header">
              <p id="typingLine" class="typing-line">&nbsp;</p>
              <span id="typingCursor" class="typing-cursor" aria-hidden="true">|</span>
            </header>
            <div id="flowBody" class="flow-body" hidden>
              <nav id="stepPills" class="step-pills" aria-label="Letter steps"></nav>
              <section id="stepPanel" class="step-panel"></section>
              <footer class="step-actions">
                <button id="backBtn" type="button">Back</button>
                <button id="nextBtn" type="button">Next</button>
              </footer>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const steps = ['recipient', 'emotion', 'design', 'summary'];
      const JEWELRY_OPTIONS = {
        Ring: ['Engagement Ring', 'Wedding Band', 'Fashion Ring', 'Signet Ring', 'Couple Ring', 'Custom Ring'],
        Necklace: ['Pendant Necklace', 'Layered Necklace', 'Name Necklace', 'Symbol Necklace', 'Gift Necklace', 'Custom Necklace'],
        Pendant: ['Initial Pendant', 'Heart Pendant', 'Cross Pendant', 'Memorial Pendant', 'Charm Pendant', 'Custom Pendant'],
        Earrings: ['Stud Earrings', 'Drop Earrings', 'Hoop Earrings', 'Huggie Earrings', 'Mismatched Earrings', 'Custom Earrings'],
        Bracelet: ['Tennis Bracelet', 'Chain Bracelet', 'Charm Bracelet', 'Bangle', 'Couple Bracelet', 'Custom Bracelet'],
        'Something Else': ['Recreate from photo', 'Redesign old jewelry', 'Memorial piece', 'Matching set', 'Gift with story', 'Fully custom idea'],
      };
      const state = {
        phase: 'intro',
        isSealActivated: false,
        isEnvelopeOpening: false,
        isPaperUnfolding: false,
        typingComplete: false,
        typedText: '',
        currentStepIndex: 0,
        recipient: '',
        emotion: '',
        category: '',
        subcategory: '',
        customRequest: '',
        referenceFiles: [],
      };

      const introLine = 'Write the feeling first. We will shape it into a one-of-a-kind piece, made to be kept for a lifetime.';

      const heroStage = document.getElementById('heroStage');
      const envelopeShell = document.getElementById('envelopeShell');
      const waxSeal = document.getElementById('waxSeal');
      const openCta = document.getElementById('openCta');
      const paperStage = document.getElementById('paperStage');
      const typingLine = document.getElementById('typingLine');
      const typingCursor = document.getElementById('typingCursor');
      const flowBody = document.getElementById('flowBody');
      const stepPills = document.getElementById('stepPills');
      const stepPanel = document.getElementById('stepPanel');
      const backBtn = document.getElementById('backBtn');
      const nextBtn = document.getElementById('nextBtn');

      function summaryLine() {
        const who = state.recipient.trim() || 'someone special';
        const mood = (state.emotion || 'devotion').toLowerCase();
        const category = state.category || 'a bespoke piece';
        const subtype = state.subcategory || 'a custom direction';
        return `For ${who}, we will translate your ${mood} into ${category.toLowerCase()} — ${subtype.toLowerCase()} — crafted as a singular expression of your story.`;
      }

      function renderPills() {
        stepPills.innerHTML = '';
        steps.forEach((step, index) => {
          const el = document.createElement('span');
          el.className = `step-pill${index === state.currentStepIndex ? ' is-active' : ''}${index < state.currentStepIndex ? ' is-complete' : ''}`;
          el.textContent =
            step === 'recipient' ? 'Muse' :
            step === 'emotion' ? 'Feeling' :
            step === 'design' ? 'Signature' :
            'Promise';
          stepPills.appendChild(el);
        });
      }

      function renderStep() {
        const current = steps[state.currentStepIndex];
        if (current === 'recipient') {
          stepPanel.innerHTML = `
            <h2>Your Muse</h2>
            <label for="recipientInput">Whose name should this piece carry forever?</label>
            <input id="recipientInput" placeholder="Enter their name" value="${state.recipient.replaceAll('"', '&quot;')}" />
          `;
          document.getElementById('recipientInput').addEventListener('input', (e) => {
            state.recipient = e.target.value;
          });
        }
        if (current === 'emotion') {
          stepPanel.innerHTML = '<h2>The Feeling</h2><p>Choose the emotion you want them to feel the moment they receive it.</p><div class="option-row" id="emotionRow"></div>';
          ['Admiration', 'Gratitude', 'Affection'].forEach((choice) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = `option-btn emotion-card${state.emotion === choice ? ' is-selected' : ''}`;
            btn.textContent = choice;
            btn.onclick = () => {
              state.emotion = choice;
              renderStep();
            };
            document.getElementById('emotionRow').appendChild(btn);
          });
        }
        if (current === 'design') {
          stepPanel.innerHTML = `
            <h2>Your Signature Piece</h2>
            <p>Select the category that best matches the piece you want to bring to life.</p>
            <p id="designStoryText" style="margin-top: 4px; font-style: italic;"></p>
            <div id="designPreview" style="
              margin-top: 12px;
              padding: 14px;
              border-radius: 12px;
              background:
                linear-gradient(rgba(255,248,232,0.40), rgba(255,248,232,0.40)),
                radial-gradient(circle at 50% 50%, rgba(255,215,140,0.12), transparent 70%);
              border: 1px solid rgba(108,82,42,0.25);
              color: #3e270f;
              line-height: 1.6;
              font-style: italic;
              transition: all 0.4s ease;
              box-shadow: 0 6px 18px rgba(108,82,42,0.15);
            ">
              Your piece will begin to take shape here.
            </div>
            <div class="option-row" id="categoryRow"></div>
            <div id="subtypeSection"></div>
          `;

          const designStoryText = document.getElementById('designStoryText');
          const designPreview = document.getElementById('designPreview');
          const subtypeSection = document.getElementById('subtypeSection');

          const updateDesignStory = () => {
            if (!state.category || !state.subcategory) {
              designStoryText.textContent = 'Choose a direction and we will shape it into a singular piece.';
            } else {
              const customStories = {
                'Ring|Engagement Ring': 'We are shaping an engagement ring that carries your story.',
                'Bracelet|Charm Bracelet': 'A charm bracelet, composed with meaning and memory.',
              };
              const key = `${state.category}|${state.subcategory}`;
              designStoryText.textContent = customStories[key] || `We are shaping a ${state.subcategory.toLowerCase()} as your bespoke ${state.category.toLowerCase()} piece.`;
            }

            if (state.category && state.subcategory) {
              designPreview.textContent = `A ${state.subcategory.toLowerCase()} is forming, guided by your intention.`;
              designPreview.style.background = 'linear-gradient(rgba(255,248,232,0.40), rgba(255,248,232,0.40)), radial-gradient(circle at 50% 50%, rgba(255,215,140,0.28), transparent 70%)';
              designPreview.style.boxShadow = '0 12px 30px rgba(108,82,42,0.35)';
              designPreview.style.transform = 'scale(1.02)';
            } else if (state.category) {
              designPreview.textContent = `We are shaping a ${state.category.toLowerCase()} piece.`;
              designPreview.style.background = 'linear-gradient(rgba(255,248,232,0.40), rgba(255,248,232,0.40)), radial-gradient(circle at 50% 50%, rgba(255,215,140,0.18), transparent 70%)';
              designPreview.style.boxShadow = '0 8px 22px rgba(108,82,42,0.22)';
              designPreview.style.transform = 'scale(1)';
            } else {
              designPreview.textContent = 'Your piece will begin to take shape here.';
              designPreview.style.background = 'linear-gradient(rgba(255,248,232,0.40), rgba(255,248,232,0.40)), radial-gradient(circle at 50% 50%, rgba(255,215,140,0.12), transparent 70%)';
              designPreview.style.boxShadow = '0 4px 10px rgba(108,82,42,0.1)';
              designPreview.style.transform = 'scale(1)';
            }
          };

          const syncSelectedButtons = (containerId, value) => {
            const buttons = document.querySelectorAll(`#${containerId} .option-btn`);
            buttons.forEach((button) => {
              button.classList.toggle('is-selected', button.dataset.value === value);
            });
          };

          const syncReferenceFiles = (incomingFiles, isImageUpload) => {
            const names = Array.from(incomingFiles || []).map((file) => file.name);
            const imagePattern = /\.(png|jpg|jpeg|gif|webp|svg)$/i;
            const currentImages = state.referenceFiles.filter((name) => imagePattern.test(name));
            const currentDocs = state.referenceFiles.filter((name) => !imagePattern.test(name));
            state.referenceFiles = isImageUpload ? [...names, ...currentDocs] : [...currentImages, ...names];
          };

          const renderSubtypeSection = () => {
            if (!state.category) {
              subtypeSection.innerHTML = '';
              updateDesignStory();
              return;
            }

            subtypeSection.innerHTML = `
              <p style="margin-top: 14px;">Choose the direction that feels closest to your vision.</p>
              <div class="option-row" id="subtypeRow"></div>
              <label for="customRequests" style="margin-top: 14px; display: block;">Other custom requests</label>
              <textarea id="customRequests" placeholder="Tell us about engraving, stone shape, inspiration, story, meaning, or any special request." style="width: min(440px, 100%); border: 1px solid #b0864a; border-radius: 12px; padding: 12px 14px; font-size: 1rem; background: rgba(255, 255, 255, 0.95); color: #2a1708; box-shadow: inset 0 1px 2px rgba(99, 67, 30, 0.16), 0 1px 0 rgba(255, 255, 255, 0.7); min-height: 110px; resize: vertical;"></textarea>
              <label for="uploadImages" style="margin-top: 14px; display: block;">Upload Images</label>
              <label for="uploadImages" style="display: block; width: min(440px, 100%); border: 1px solid #b0864a; border-radius: 12px; padding: 12px 14px; cursor: pointer; background: rgba(255,255,255,0.8);">Click to upload images</label>
              <input id="uploadImages" type="file" accept="image/*" multiple style="display: none;" />
              <p id="uploadImagesList" style="margin-top: 8px; font-size: 0.92rem;"></p>
              <label for="uploadFiles" style="margin-top: 12px; display: block;">Upload Files</label>
              <label for="uploadFiles" style="display: block; width: min(440px, 100%); border: 1px solid #b0864a; border-radius: 12px; padding: 12px 14px; cursor: pointer; background: rgba(255,255,255,0.8);">Click to upload files</label>
              <input id="uploadFiles" type="file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" multiple style="display: none;" />
              <p id="uploadFilesList" style="margin-top: 8px; font-size: 0.92rem;"></p>
            `;

            const subtypeRow = document.getElementById('subtypeRow');
            JEWELRY_OPTIONS[state.category].forEach((choice) => {
              const btn = document.createElement('button');
              btn.type = 'button';
              btn.dataset.value = choice;
              btn.className = `option-btn design-chip${state.subcategory === choice ? ' is-selected' : ''}`;
              btn.textContent = choice;
              btn.onclick = () => {
                state.subcategory = choice;
                syncSelectedButtons('subtypeRow', choice);
                updateDesignStory();
              };
              subtypeRow.appendChild(btn);
            });

            const customRequests = document.getElementById('customRequests');
            customRequests.value = state.customRequest;
            customRequests.addEventListener('input', (e) => {
              state.customRequest = e.target.value;
            });

            const uploadImages = document.getElementById('uploadImages');
            const uploadFiles = document.getElementById('uploadFiles');
            const uploadImagesList = document.getElementById('uploadImagesList');
            const uploadFilesList = document.getElementById('uploadFilesList');

            const imagePattern = /\.(png|jpg|jpeg|gif|webp|svg)$/i;
            const currentImages = state.referenceFiles.filter((name) => imagePattern.test(name));
            const currentDocs = state.referenceFiles.filter((name) => !imagePattern.test(name));
            uploadImagesList.textContent = currentImages.length ? currentImages.join(', ') : 'No images selected yet';
            uploadFilesList.textContent = currentDocs.length ? currentDocs.join(', ') : 'No files selected yet';

            uploadImages.addEventListener('change', (e) => {
              syncReferenceFiles(e.target.files, true);
              const imageNames = Array.from(e.target.files || []).map((file) => file.name);
              uploadImagesList.textContent = imageNames.length ? imageNames.join(', ') : 'No images selected yet';
            });

            uploadFiles.addEventListener('change', (e) => {
              syncReferenceFiles(e.target.files, false);
              const fileNames = Array.from(e.target.files || []).map((file) => file.name);
              uploadFilesList.textContent = fileNames.length ? fileNames.join(', ') : 'No files selected yet';
            });

            updateDesignStory();
          };

          Object.keys(JEWELRY_OPTIONS).forEach((choice) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.dataset.value = choice;
            btn.className = `option-btn design-chip${state.category === choice ? ' is-selected' : ''}`;
            btn.textContent = choice;
            btn.onclick = () => {
              state.category = choice;
              state.subcategory = '';
              syncSelectedButtons('categoryRow', choice);
              renderSubtypeSection();
            };
            document.getElementById('categoryRow').appendChild(btn);
          });
          renderSubtypeSection();
        }
        if (current === 'summary') {
          const referenceList = state.referenceFiles.length ? state.referenceFiles.join(', ') : 'None uploaded yet';
          stepPanel.innerHTML = `
            <h2>Your Bespoke Promise</h2>
            <p>${summaryLine()}</p>
            <p><strong>Category:</strong> ${state.category || 'Not selected yet'}</p>
            <p><strong>Subcategory:</strong> ${state.subcategory || 'Not selected yet'}</p>
            <p><strong>Custom Request:</strong> ${state.customRequest || 'No additional requests yet.'}</p>
            <p><strong>Reference Files:</strong> ${referenceList}</p>
            <p>This is where your custom jewelry journey begins—crafted by hand, rooted in feeling, and made only for your story.</p>
            <p>From this moment forward, this piece will be brought to life by real hands, guided by your story.</p>
            <p style="text-align: center; font-size: 1.05rem; font-style: italic; margin: 16px 0 14px;">This piece now exists — not in metal yet, but in meaning. The next step is where it becomes real.</p>
            <button id="startBespokeBtn" type="button" class="option-btn">START YOUR BESPOKE PIECE</button>
          `;

          document.getElementById('startBespokeBtn').addEventListener('click', () => {
            const showOrderForm = () => {
              stepPanel.innerHTML = `
                <h2>Begin Your Order</h2>
                <p>Share your contact details and we will personally continue your bespoke journey.</p>
                <label for="orderEmail">Email</label>
                <input id="orderEmail" type="email" placeholder="you@example.com" required />
                <label for="orderNote" style="margin-top: 12px; display: block;">Optional note</label>
                <textarea id="orderNote" placeholder="Share anything you'd like our atelier to know." style="width: min(440px, 100%); border: 1px solid #b0864a; border-radius: 12px; padding: 12px 14px; font-size: 1rem; background: rgba(255, 255, 255, 0.95); color: #2a1708; box-shadow: inset 0 1px 2px rgba(99, 67, 30, 0.16), 0 1px 0 rgba(255, 255, 255, 0.7); min-height: 110px; resize: vertical;"></textarea>
                <button id="submitOrderBtn" type="button" class="option-btn" style="margin-top: 14px;">Submit request</button>
                <p id="orderStatus" style="margin-top: 10px;"></p>
              `;
              stepPanel.style.opacity = '1';

              document.getElementById('submitOrderBtn').addEventListener('click', () => {
                const email = document.getElementById('orderEmail').value;
                const note = document.getElementById('orderNote').value;
                console.log('Bespoke order initiation', {
                  email,
                  note,
                  recipient: state.recipient,
                  emotion: state.emotion,
                  category: state.category,
                  subcategory: state.subcategory,
                  customRequest: state.customRequest,
                  referenceFiles: state.referenceFiles,
                });
                document.getElementById('orderStatus').textContent = 'Thank you. Our team will reach out shortly to begin crafting your piece.';
              });
            };

            stepPanel.style.transition = 'opacity 0.4s ease';
            stepPanel.style.opacity = '0';

            window.setTimeout(() => {
              stepPanel.innerHTML = '<p style="text-align: center; font-style: italic; font-size: 1.05rem; margin: 22px 0;">We are now preparing your piece...<br>Every detail will be shaped with intention.</p>';
              stepPanel.style.opacity = '0';
              stepPanel.style.transition = 'opacity 0.3s ease';
              window.setTimeout(() => {
                stepPanel.style.opacity = '1';
              }, 20);

              window.setTimeout(() => {
                stepPanel.style.opacity = '0';
                window.setTimeout(() => {
                  showOrderForm();
                }, 400);
              }, 1200);
            }, 400);
          });
        }

        backBtn.disabled = state.currentStepIndex === 0;
        nextBtn.disabled = state.currentStepIndex === steps.length - 1;
      }

      function renderFlow() {
        renderPills();
        renderStep();
      }

      function startTyping() {
        let i = 0;
        state.typedText = '';
        state.typingComplete = false;
        typingLine.textContent = '\u00A0';
        typingCursor.classList.remove('is-done');

        const timer = window.setInterval(() => {
          i += 1;
          typingLine.textContent = introLine.slice(0, i);
          if (i >= introLine.length) {
            window.clearInterval(timer);
            state.typingComplete = true;
            typingCursor.classList.add('is-done');
            flowBody.hidden = false;
            renderFlow();
          }
        }, 42);
      }

      function triggerLetterOpening() {
        if (state.phase !== 'intro') return;
        state.phase = 'opening';

        state.isSealActivated = true;
        waxSeal.classList.add('is-activated');

        window.setTimeout(() => {
          state.isEnvelopeOpening = true;
          envelopeShell.classList.add('is-open');
        }, 260);

        window.setTimeout(() => {
          state.isPaperUnfolding = true;
          state.phase = 'paper';
          heroStage.classList.add('is-shifted');
          paperStage.classList.add('is-visible');
          startTyping();
        }, 980);
      }

      waxSeal.addEventListener('click', triggerLetterOpening);
      openCta.addEventListener('click', triggerLetterOpening);
      nextBtn.addEventListener('click', () => {
        state.currentStepIndex = Math.min(state.currentStepIndex + 1, steps.length - 1);
        renderFlow();
      });
      backBtn.addEventListener('click', () => {
        state.currentStepIndex = Math.max(state.currentStepIndex - 1, 0);
        renderFlow();
      });
    </script>
  </body>
</html>
